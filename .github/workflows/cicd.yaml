name: CI_CD
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (backend)
        run: npm ci

      - name: Install dependencies (frontend)
        working-directory: src/front/svelte-app
        run: npm ci

      - name: Build UI
        working-directory: src/front/svelte-app
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # DEBUG: arranca el servidor en background y verifica que responde
      - name: Start server in background
        run: npm start &

      - name: Wait for server to be ready
        run: |
          echo "Esperando que el servidor arranque..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "Servidor listo después de $i segundos"
              break
            fi
            echo "Intento $i/30 - servidor no disponible aún..."
            sleep 2
          done
          curl -v http://localhost:8080 || echo "ERROR: servidor no responde"

      - name: Run Playwright tests
        run: npx playwright test

      - name: Run Newman API tests
        run: npm test-local

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30